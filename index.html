<style>
  :root{
    --bg:#000; --bg-alt:#0a0a0a; --panel:#1c1c1e; --panel-2:#2c2c2e;
    --line:rgba(255,255,255,0.08); --cream:#fff; --muted:#8E8E93;
    --gold:#F2B705; --gold-dim:#3a3520; --bonus:#34C759; --bonus-dim:#0a3a18;
    --malus:#FF453A; --malus-dim:#3a1210; --radius:14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{background:#050505;color:var(--cream);font-family:'Nunito',sans-serif;
    min-height:100vh;font-size:16px;color-scheme:dark;position:relative;}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(242,183,5,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(242,183,5,0.04) 1px, transparent 1px);
    background-size:40px 40px;}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(242,183,5,0.14) 0%, transparent 45%),
      radial-gradient(ellipse at 75% 70%, rgba(52,199,89,0.08) 0%, transparent 45%);}
  input,select,textarea{-webkit-user-select:auto;user-select:auto;}
  #app{max-width:640px;margin:0 auto;padding:calc(12px + var(--safe-top)) 14px calc(90px + var(--safe-bottom));
    position:relative;z-index:1;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    border-bottom:0.5px solid var(--line);margin-bottom:16px;gap:8px;}
  .brand h1{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:0.8px;margin:0;color:#fff;}
  .brand h1 span{color:var(--gold);}
  .brand small{color:var(--muted);font-weight:600;font-size:11px;letter-spacing:0.4px;}
  .mimmi-pill{flex-shrink:0;background:var(--gold-dim);border:1px solid #4a4528;
    padding:7px 11px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--gold);font-weight:700;white-space:nowrap;}

  .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:rgba(10,10,10,0.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:0.5px solid var(--line);
    display:flex;padding:6px 4px calc(6px + var(--safe-bottom));}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
    color:#636366;font-family:'Nunito',sans-serif;padding:8px 2px;border-radius:12px;font-size:10px;
    font-weight:800;letter-spacing:0.2px;min-height:52px;transition:color .2s;}
  .nav-btn .ic{font-size:20px;line-height:1;}
  .nav-btn.active{color:var(--gold);}

  h2.section-title{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:0.4px;font-size:20px;
    margin:2px 0 14px;color:#fff;}

  .team-card{background:var(--panel);border:0.5px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;position:relative;overflow:hidden;
    transition:transform .15s ease;}
  .team-card:active{transform:scale(0.98);}
  .team-card.over-budget{border-color:rgba(255,69,58,0.4);}
  .team-card.incomplete{border-color:rgba(242,183,5,0.3);}
  .rank-badge{position:absolute;top:0;left:0;background:var(--gold);color:#000;font-family:'Anton',sans-serif;
    font-size:13px;padding:4px 12px 5px 14px;border-bottom-right-radius:12px;}
  .rank-badge.r2{background:#999;} .rank-badge.r3{background:#C87C3C;}
  .team-head{display:flex;justify-content:space-between;align-items:flex-start;margin-top:16px;gap:8px;}
  .team-name{font-weight:800;font-size:16px;color:#fff;line-height:1.3;}
  .team-anim{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px;}
  .team-score{font-family:'Anton',sans-serif;font-size:28px;color:var(--gold);line-height:1;text-align:right;}
  .team-score-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:right;}
  .badge{display:inline-block;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:0.3px;
    text-transform:uppercase;margin:2px 4px 0 0;}
  .badge.over{background:var(--malus-dim);color:var(--malus);}
  .badge.incomplete{background:var(--gold-dim);color:var(--gold);}
  .badge.mine{background:var(--bonus-dim);color:var(--bonus);}
  .members{display:flex;flex-wrap:wrap;gap:5px;margin:12px 0 10px;}
  .member-chip{background:var(--panel-2);border:0.5px solid var(--line);border-radius:8px;padding:6px 9px;
    font-size:12px;display:flex;align-items:center;gap:5px;}
  .member-chip .cap-star{color:var(--gold);}
  .member-chip .mpts{font-family:'JetBrains Mono',monospace;font-weight:700;color:#fff;}
  .member-chip.empty{color:var(--muted);font-style:italic;border-style:dashed;}
  .budget-bar-wrap{height:4px;background:var(--panel-2);border-radius:3px;overflow:hidden;margin-bottom:8px;}
  .budget-bar{height:100%;background:var(--bonus);transition:width .3s ease;border-radius:3px;}
  .budget-bar.over{background:var(--malus);}
  .budget-text{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .btn{background:var(--panel-2);border:0.5px solid var(--line);color:#fff;padding:12px 16px;
    border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
    min-height:46px;touch-action:manipulation;transition:transform .12s ease,opacity .12s;}
  .btn:active{transform:scale(0.97);opacity:0.85;}
  .btn.primary{background:var(--gold);color:#000;border-color:var(--gold);}
  .btn.danger{color:var(--malus);}
  .btn.small{padding:8px 12px;font-size:12px;min-height:38px;border-radius:8px;}
  .btn.block{width:100%;}
  .btn:disabled{opacity:.35;}

  .lock-note{background:var(--gold-dim);border:0.5px solid #4a4528;border-radius:12px;padding:13px 14px;
    font-size:13.5px;color:var(--gold);margin-bottom:14px;line-height:1.4;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;
    text-transform:uppercase;letter-spacing:0.5px;}
  .field input[type=text],.field select{width:100%;background:var(--panel);border:0.5px solid var(--line);
    color:#fff;padding:12px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:16px;min-height:46px;}
  .field input[type=datetime-local]{box-sizing:border-box;width:100%;max-width:100%;background:var(--panel);
    border:0.5px solid var(--line);color:#fff;padding:12px 8px;border-radius:10px;
    font-family:'JetBrains Mono',monospace;font-size:14px;min-height:46px;}
  .date-input-wrap{width:100%;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
  @media(max-width:380px){.field input[type=datetime-local]{font-size:12px;padding:10px 4px;}}
  .cost-live{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);margin:8px 0 14px;font-weight:600;}
  .cost-live.over{color:var(--malus);font-weight:800;}
  .form-panel{background:var(--panel);border:0.5px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;}
  .search-bar{width:100%;background:var(--panel);border:0.5px solid var(--line);color:#fff;
    padding:12px 14px;border-radius:12px;font-size:16px;margin-bottom:12px;min-height:46px;}
  ::placeholder{color:#636366;}

  .bambini-list{border:0.5px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .bambini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .bambino-card{background:var(--panel);border:0.5px solid var(--line);border-radius:12px;
    padding:10px 11px;min-height:58px;}
  .bambino-card .bnome{color:#fff;font-weight:800;font-size:12.5px;line-height:1.25;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bambino-card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
  .bambino-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;
    border-bottom:0.5px solid var(--line);background:var(--panel);gap:8px;}
  .bambino-row:last-child{border-bottom:none;}
  .bambino-row:nth-child(even){background:#242426;}
  .bnome{font-weight:700;font-size:14px;color:#fff;}
  .bteams{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .bmeta{display:flex;gap:12px;align-items:center;flex-shrink:0;}
  .bcost{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:12px;}
  .btot{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px;color:#fff;}

  .day-picker{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
  .day-btn{flex-shrink:0;background:var(--panel);border:0.5px solid var(--line);color:var(--muted);padding:10px 16px;
    border-radius:999px;font-weight:800;font-size:13px;cursor:pointer;min-height:42px;
    transition:all .15s ease;}
  .day-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
  .kid-picker{display:flex;flex-wrap:wrap;gap:6px;max-height:32vh;overflow-y:auto;border:0.5px solid var(--line);
    border-radius:var(--radius);padding:12px;background:var(--panel);margin-bottom:8px;-webkit-overflow-scrolling:touch;}
  .kid-chip{background:var(--panel-2);border:0.5px solid var(--line);padding:9px 13px;border-radius:999px;
    font-size:13px;cursor:pointer;min-height:38px;display:flex;align-items:center;color:#fff;
    transition:all .15s ease;}
  .kid-chip.selected{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800;}
  .selected-count{font-size:12.5px;color:var(--muted);margin-bottom:14px;font-weight:600;}
  .cat-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
  .cat-tab{flex-shrink:0;background:var(--panel);border:0.5px solid var(--line);color:var(--muted);padding:10px 14px;
    border-radius:10px;font-weight:800;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.3px;
    min-height:40px;white-space:nowrap;transition:all .15s ease;}
  .cat-tab.active.bonus{background:var(--bonus);color:#000;border-color:var(--bonus);}
  .cat-tab.active.malus{background:var(--malus);color:#fff;border-color:var(--malus);}
  .cat-tab.active.speciale{background:var(--gold);color:#000;border-color:var(--gold);}
  .catalog-grid{display:flex;flex-direction:column;gap:8px;}
  .cat-item{background:var(--panel);border:0.5px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;
    text-align:left;min-height:52px;transition:transform .12s ease;}
  .cat-item:active{transform:scale(0.97);}
  .cat-item .cn{font-weight:800;font-size:14px;color:#fff;}
  .cat-item .cd{font-size:12px;color:var(--muted);margin-top:3px;}
  .cat-item .cp{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:15px;float:right;}
  .cat-item.bonus .cp{color:var(--bonus);} .cat-item.malus .cp{color:var(--malus);} .cat-item.speciale .cp{color:var(--gold);}

  .toast{position:fixed;bottom:calc(78px + var(--safe-bottom));left:50%;transform:translateX(-50%);
    background:var(--gold);color:#000;font-weight:800;padding:12px 20px;border-radius:999px;
    box-shadow:0 6px 24px rgba(242,183,5,0.35);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
    font-size:13.5px;z-index:80;max-width:88vw;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .log-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;
    border-bottom:0.5px solid var(--line);background:var(--panel);gap:10px;flex-wrap:wrap;}
  .log-row:nth-child(even){background:#242426;}
  .log-name{font-weight:700;font-size:13.5px;color:#fff;}
  .log-label{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .log-right{display:flex;align-items:center;gap:8px;}
  .log-pts{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px;}
  .log-pts.pos{color:var(--bonus);} .log-pts.neg{color:var(--malus);}
  .log-day{font-size:10px;background:var(--panel-2);border:0.5px solid var(--line);padding:3px 8px;
    border-radius:999px;color:var(--muted);}

  .empty-note{color:var(--muted);font-size:13.5px;text-align:center;padding:34px 14px;line-height:1.5;}
  .loading{color:var(--muted);text-align:center;padding:60px 16px;font-size:14px;line-height:1.6;}
  .admin-row{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;
    background:var(--panel);border:0.5px solid var(--line);border-radius:10px;margin-bottom:7px;
    font-size:13.5px;gap:8px;color:#fff;}

  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:80vh;text-align:center;padding:24px;}
  .login-screen h1{font-family:'Anton',sans-serif;font-size:32px;margin:0 0 6px;color:#fff;}
  .login-screen h1 span{color:var(--gold);}
  .login-screen p{color:var(--muted);font-size:14px;margin:6px 0 28px;max-width:340px;line-height:1.5;}
  .google-btn{background:#fff;color:#000;border:none;border-radius:12px;padding:14px 24px;
    font-weight:800;font-size:15px;display:flex;align-items:center;gap:10px;min-height:50px;}
  .webview-warn{background:var(--gold-dim);border:0.5px solid #4a4528;border-radius:12px;padding:12px 14px;
    font-size:12.5px;color:var(--gold);margin-top:20px;max-width:340px;line-height:1.4;}
</style>

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function toast(msg){

const SYNTHETIC_DOMAIN = "@fantacampo.local";

/* ---------- AUTH: nickname + password ---------- */
function validUsername(u){ return /^[a-z0-9_]{3,20}$/.test(u); }

function renderLogin(){
  const app = document.getElementById("app");
  app.innerHTML =
    '<div class="login-screen">'+
      '<h1>FANTA<span>CAMPO</span></h1>'+
      '<p>Scegli un nickname e una password per creare la tua squadra e seguire la classifica del campo.</p>'+
      '<div class="form-panel" style="width:100%;max-width:320px;text-align:left;">'+
        '<div class="field"><label>Nickname</label><input type="text" id="loginUser" placeholder="es. teo" autocapitalize="off" autocorrect="off"></div>'+
        '<div class="field"><label>Password</label><input type="text" id="loginPass" placeholder="almeno 6 caratteri"></div>'+
        '<div id="loginMsg" style="font-size:12.5px;color:var(--malus);margin-bottom:10px;min-height:16px;"></div>'+
        '<button class="btn primary block" id="loginBtn" style="margin-bottom:8px;">Accedi</button>'+
        '<button class="btn block" id="registerBtn">Crea nuovo account</button>'+
      '</div>'+
    '</div>';

  function readInputs(){
    const u = (document.getElementById("loginUser").value||"").trim().toLowerCase();
    const p = document.getElementById("loginPass").value||"";
    return {u:u, p:p};
  }
  function showMsg(t){ document.getElementById("loginMsg").textContent = t; }

  document.getElementById("loginBtn").onclick = function(){
    const v = readInputs();
    if(!validUsername(v.u)){ showMsg("Nickname non valido (solo lettere/numeri/underscore, 3-20 caratteri)"); return; }
    showMsg("Accesso in corso...");
    auth.signInWithEmailAndPassword(v.u+SYNTHETIC_DOMAIN, v.p).catch(function(e){
      if(e.code==="auth/user-not-found") showMsg("Nickname non trovato. Usa \"Crea nuovo account\" se è la prima volta.");
      else if(e.code==="auth/wrong-password" || e.code==="auth/invalid-credential") showMsg("Password errata.");
      else showMsg("Errore: "+e.message);
    });
  };
  document.getElementById("registerBtn").onclick = function(){
    const v = readInputs();
    if(!validUsername(v.u)){ showMsg("Nickname non valido (solo lettere/numeri/underscore, 3-20 caratteri)"); return; }
    if(v.p.length<6){ showMsg("La password deve avere almeno 6 caratteri"); return; }
    showMsg("Creazione account in corso...");
    auth.createUserWithEmailAndPassword(v.u+SYNTHETIC_DOMAIN, v.p).then(function(cred){
      return db.collection("utenti").doc(v.u).set({
        username: v.u, stato: (v.u===OWNER_USERNAME?"attivo":"in_attesa"), createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }).catch(function(e){
      if(e.code==="auth/email-already-in-use") showMsg("Questo nickname è già in uso. Usa \"Accedi\" invece.");
      else if(e.code==="auth/weak-password") showMsg("Password troppo debole (minimo 6 caratteri).");
      else showMsg("Errore: "+e.message);
    });
  };
}

async function ensureUtenteDoc(){
  const uname = usernameOf(user.email);
  const ref = db.collection("utenti").doc(uname);
  try{
    const doc = await ref.get();
    if(!doc.exists){
      await ref.set({ username: uname, stato: (uname===OWNER_USERNAME?"attivo":"in_attesa"), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else if(uname===OWNER_USERNAME && doc.data().stato!=="attivo"){
      // il proprietario è sempre attivo, anche se il documento era rimasto in uno stato vecchio
      await ref.update({stato:"attivo"});
    }
  }catch(e){ console.error("ensureUtenteDoc", e); }
}

auth.onAuthStateChanged(function(u){
  unsubscribers.forEach(function(fn){ fn(); }); unsubscribers = [];
  user = u;
  if(!user){ renderLogin(); return; }
  ensureUtenteDoc().then(attachListeners);
});

/* ---------- FIRESTORE LISTENERS (tempo reale) ---------- */
function attachListeners(){
  document.getElementById("app").innerHTML = '<div class="loading">Caricamento FantaCampo...</div>';

  unsubscribers.push(db.collection("config").doc("main").onSnapshot(function(doc){
    state.config = doc.exists ? doc.data() : null;
    render();
  }, function(e){ console.error(e); }));

  unsubscribers.push(db.collection("admins").onSnapshot(function(snap){
    state.admins = snap.docs.map(function(d){ return d.id; });
    render();
  }, function(e){ console.error(e); }));

  unsubscribers.push(db.collection("bambini").onSnapshot(function(snap){
    state.bambini = snap.docs.map(function(d){ return Object.assign({nome:d.id}, d.data()); });
    render();
  }, function(e){ console.error(e); }));

  unsubscribers.push(db.collection("squadre").onSnapshot(function(snap){
    state.squadre = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    render();
  }, function(e){ console.error(e); }));

  unsubscribers.push(db.collection("punti_log").onSnapshot(function(snap){
    state.punti = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    render();
  }, function(e){
    // permesso negato = classifica nascosta per questo utente in questo momento: non è un errore
    state.punti = null;
    render();
  }));

  unsubscribers.push(db.collection("utenti").doc(usernameOf(user.email)).onSnapshot(function(doc){
    state.mioUtente = doc.exists ? Object.assign({id:doc.id}, doc.data()) : null;
    render();
  }, function(e){ console.error(e); }));

  if(isOwner()){
    unsubscribers.push(db.collection("utenti").onSnapshot(function(snap){
      state.utenti = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      render();
    }, function(e){ console.error(e); }));
  }

  unsubscribers.push(db.collection("gruppi").onSnapshot(function(snap){
    state.gruppi = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    render();
  }, function(e){ console.error(e); }));
}

/* ---------- HELPERS DI CALCOLO ---------- */
function findBambino(nome){ return state.bambini.filter(function(b){ return b.nome===nome; })[0]; }
function puntiTotaliBambino(nome){
  if(!state.punti) return null;
  let tot = 0;
  state.punti.forEach(function(p){ if(p.bambino===nome) tot += Number(p.punti); });
  return tot;
}
function teamScoreCost(team){
  let costo = 0, punteggio = 0, computabile = state.punti !== null;
  (team.componenti||[]).forEach(function(n){
    if(!n) return;
    const b = findBambino(n);
    if(!b) return;
    costo += b.costo;
    if(computabile){
      let pts = puntiTotaliBambino(n) || 0;
      if(n === team.capitano) pts = pts*2;
      punteggio += pts;
    }
  });
  return { costo:costo, punteggio: computabile ? punteggio : null };
}

function scadenzaSquadrePassata(){
  if(!state.config || !state.config.scadenzaSquadre) return false;
  return new Date() > state.config.scadenzaSquadre.toDate();
}
function scadenzaPuntiPassata(){
  if(!state.config || !state.config.scadenzaPunti) return false;
  return new Date() > state.config.scadenzaPunti.toDate();
}
function msRimanenti(ts){
  if(!ts) return null;
  const d = ts.toDate ? ts.toDate() : ts; // supporta sia Timestamp Firestore che Date
  if(!(d instanceof Date) || isNaN(d.getTime())) return null;
  return d.getTime() - Date.now();
}
function formatCountdown(ts){
  const ms = msRimanenti(ts);
  if(ms===null) return "";
  if(ms<=0) return "Scaduta";
  const totMin = Math.floor(ms/60000);
  const giorni = Math.floor(totMin/1440);
  const ore = Math.floor((totMin%1440)/60);
  const min = totMin%60;
  if(giorni>0) return "Mancano "+giorni+"g "+ore+"h";
  if(ore>0) return "Mancano "+ore+"h "+min+"m";
  return "Mancano "+min+" minuti";
}
function classificaVisibile(){
  if(isAdmin()) return true;
  if(state.config && state.config.classificaFinalePubblicata) return true;
  if(scadenzaPuntiPassata()) return false; // doppio controllo lato app: dopo la scadenza, nascosta a prescindere da eventuali dati residui
  return state.punti !== null; // se non riusciamo a leggere i punti = nascosta dalle regole del database
}
function statoClassificaInfo(){
  if(state.config.classificaFinalePubblicata) return {label:"pubblicata (finale)", color:"var(--bonus)"};
  if(scadenzaPuntiPassata()) return {label:"nascosta automaticamente (raccolta punti terminata)", color:"var(--gold)"};
  return {label:"live (visibile a tutti)", color:"var(--bonus)"};
}

/* ---------- SETUP INIZIALE (solo owner, se il database è vuoto) ---------- */
async function needsSetup(){
  const snap = await db.collection("config").doc("main").get();
  return !snap.exists;
}
async function runSetup(){
  const batch = db.batch();
  const cfgRef = db.collection("config").doc("main");
  const now = new Date();
  const scadSquadre = new Date(now.getFullYear(), now.getMonth(), now.getDate()+7);
  const scadPunti = new Date(now.getFullYear(), now.getMonth(), now.getDate()+14);
  batch.set(cfgRef, {
    scadenzaSquadre: firebase.firestore.Timestamp.fromDate(scadSquadre),
    scadenzaPunti: firebase.firestore.Timestamp.fromDate(scadPunti),
    classificaFinalePubblicata: false
  });
  const adminRef = db.collection("admins").doc(OWNER_USERNAME);
  batch.set(adminRef, {addedAt: firebase.firestore.FieldValue.serverTimestamp()});
  await batch.commit();
  toast("Configurazione iniziale creata! Ora vai su Admin > Gestione ragazzi per aggiungerli.");
}

function teamCard(team, idx, mine){
  const sc = teamScoreCost(team);
  const over = sc.costo > 100;
  const incomplete = (team.componenti||[]).filter(function(n){return n;}).length < 5;
  const rankClass = idx===0?"":idx===1?"r2":idx===2?"r3":"";
  const chips = [0,1,2,3,4].map(function(i){
    const n = (team.componenti||[])[i];
    if(!n) return '<div class="member-chip empty">slot vuoto</div>';
    const isCap = n===team.capitano;
    const p = puntiTotaliBambino(n);
    const pts = p===null ? "—" : (isCap ? p*2 : p);
    return '<div class="member-chip">'+(isCap?'<span class="cap-star">★</span>':'')+escapeHtml(n)+' <span class="mpts">'+pts+'</span></div>';
  }).join("");
  return (
    '<div class="team-card '+(over?'over-budget':'')+' '+(incomplete?'incomplete':'')+'">'+
      '<div class="rank-badge '+rankClass+'">'+(idx+1)+'°</div>'+
      '<div class="team-head"><div><div class="team-name">'+escapeHtml(team.nomeSquadra||"Senza nome")+'</div>'+
        '<div class="team-anim">animatore: '+escapeHtml(team.animatoreNome||team.id)+'</div>'+
        '<div>'+(mine?'<span class="badge mine">tua squadra</span>':'')+
          (over?'<span class="badge over">sopra budget</span>':'')+
          (incomplete?'<span class="badge incomplete">incompleta</span>':'')+'</div></div>'+
        '<div><div class="team-score">'+(sc.punteggio===null?"—":sc.punteggio)+'</div><div class="team-score-label">punti</div></div>'+
      '</div>'+
      '<div class="members">'+chips+'</div>'+
      '<div class="budget-bar-wrap"><div class="budget-bar '+(over?'over':'')+'" style="width:'+Math.min(sc.costo,100)+'%"></div></div>'+
      '<div class="budget-text">'+sc.costo+' / 100 mimmi</div>'+
    '</div>'
  );
}

function renderClassifica(){
  if(!classificaVisibile()){
    return '<h2 class="section-title">Classifica</h2><div class="lock-note">La classifica non è ancora visibile. '+
      (scadenzaPuntiPassata() ? 'La raccolta punti è terminata: verrà ripubblicata a breve con i punteggi finali.' : 'Torna a controllare più tardi.')+
      '</div>';
  }
  let countdownBanner = "";
  if(!state.config.classificaFinalePubblicata && state.config.scadenzaPunti && state.config.scadenzaPunti.toDate){
    const scad = state.config.scadenzaPunti.toDate();
    const msRimasti = scad.getTime() - Date.now();
    if(msRimasti>0 && msRimasti <= 24*60*60*1000){
      countdownBanner = '<div class="lock-note">⏳ '+formatCountdown(scad)+' alla fine della raccolta punti: poi la classifica verrà nascosta fino alla pubblicazione finale.</div>';
    }
  }
  const sorted = state.squadre.slice().sort(function(a,b){
    const sa = teamScoreCost(a).punteggio||0, sb = teamScoreCost(b).punteggio||0;
    return sb-sa;
  });
  const cards = sorted.map(function(t,i){ return teamCard(t, i, user && t.id===usernameOf(user.email)); }).join("");
  return '<h2 class="section-title">Classifica'+(state.config.classificaFinalePubblicata?' finale':' live')+'</h2>'+
    countdownBanner+
    (cards||'<div class="empty-note">Nessuna squadra ancora creata.</div>');
}

  const msSquadre = msRimanenti(state.config.scadenzaSquadre);
  const urgente = msSquadre!==null && msSquadre>0 && msSquadre < 24*60*60*1000;
  const lockNote = scaduta
    ? '<div class="lock-note">Il tempo per creare, modificare o eliminare la squadra è scaduto.'+(isAdmin()?' Come admin puoi comunque gestirla.':' Contatta l&#39;organizzatore se serve una modifica.')+'</div>'
    : urgente
      ? '<div class="lock-note" style="border-color:var(--malus);color:var(--malus);">⏰ '+formatCountdown(state.config.scadenzaSquadre)+' per creare/modificare la tua squadra! Dopo non potrai più cambiarla.</div>'
      : '<div class="lock-note">Puoi creare o modificare la tua squadra fino alla scadenza fissata dall&#39;organizzatore. '+formatCountdown(state.config.scadenzaSquadre)+'.</div>';

  const t = ui.editingTeam || (mia ? {
    nomeSquadra: mia.nomeSquadra, animatoreNome: mia.animatoreNome,

  } : { nomeSquadra:"", animatoreNome:"", componenti:["","","","",""], capitanoIndex:0 });
  ui.editingTeam = t;

  const options = state.bambini.slice().sort(function(a,b){ return a.costo-b.costo || a.nome.localeCompare(b.nome); });

    return n ? '<option value="'+i+'" '+(t.capitanoIndex===i?'selected':'')+'>'+escapeHtml(n)+'</option>' : '';
  }).join("");
  const costo = t.componenti.reduce(function(s,n){ const b=findBambino(n); return s+(b?b.costo:0); }, 0);

  return '<h2 class="section-title">La mia squadra</h2>'+lockNote+
    '<div class="form-panel">'+
      '<div class="field"><label>Nome squadra</label><input type="text" id="nomeSquadra" value="'+escapeHtml(t.nomeSquadra)+'" placeholder="es. I Fenomeni" '+(canEdit?'':'disabled')+'></div>'+
      '<div class="field"><label>Il tuo nome (animatore)</label><input type="text" id="animatoreNome" value="'+escapeHtml(t.animatoreNome||"")+'" placeholder="Il tuo nome" '+(canEdit?'':'disabled')+'></div>'+
      selects+
      '<div class="field"><label>Capitano (punti doppi)</label><select id="capitanoIndex" '+(canEdit?'':'disabled')+'>'+capOptions+'</select></div>'+
      '<div class="cost-live '+(costo>100?'over':'')+'">Costo squadra: '+costo+' / 100 mimmi'+(costo>100?'  ⚠ sopra budget':'')+'</div>'+
      (canEdit ? '<button class="btn primary block" id="saveTeamBtn">'+(mia?'Aggiorna squadra':'Crea squadra')+'</button>' : '')+
      (canEdit && mia ? '<button class="btn danger block" id="deleteTeamBtn" style="margin-top:8px;">Elimina squadra</button>' : '')+
    '</div>';
}

function renderBambini(){
  const q = ui.search.toLowerCase();
  const items = state.bambini.filter(function(b){ return b.nome.toLowerCase().indexOf(q)!==-1; })
    .slice().sort(function(a,b){
      const pa = puntiTotaliBambino(a.nome)||0, pb = puntiTotaliBambino(b.nome)||0;
      return pb-pa;
    }).map(function(b){
      const squadre = state.squadre.filter(function(t){ return (t.componenti||[]).indexOf(b.nome)!==-1; }).map(function(t){ return t.animatoreNome||t.id; });
      const p = puntiTotaliBambino(b.nome);
      return '<div class="bambino-card"><div class="bnome">'+escapeHtml(b.nome)+'</div>'+
        '<div class="bambino-card-meta"><span class="bcost">'+b.costo+' m</span>'+

        '</div>'+
        (squadre.length?'<div class="bteams">'+escapeHtml(squadre.join(", "))+'</div>':'')+
        '</div>';
    }).join("");
  return '<h2 class="section-title">Ragazzi ('+state.bambini.length+')</h2>'+
    '<input class="search-bar" id="searchBambini" placeholder="Cerca un ragazzo..." value="'+escapeHtml(ui.search)+'">'+
    '<div class="bambini-grid">'+(items||'<div class="empty-note" style="grid-column:span 2;">Nessun risultato</div>')+'</div>';
}

/* ---------- EVENTI ---------- */
function bindTabEvents(){
  if(ui.tab==="squadra"){
    [0,1,2,3,4].forEach(function(i){
      const el = document.getElementById("comp"+i);
      if(el) el.onchange = function(){ ui.editingTeam.componenti[i] = el.value; render(); };
    });
    const nomeEl = document.getElementById("nomeSquadra");
    if(nomeEl) nomeEl.oninput = function(){ ui.editingTeam.nomeSquadra = nomeEl.value; };
    const animEl = document.getElementById("animatoreNome");
    if(animEl) animEl.oninput = function(){ ui.editingTeam.animatoreNome = animEl.value; };
    const capEl = document.getElementById("capitanoIndex");
    if(capEl) capEl.onchange = function(){ ui.editingTeam.capitanoIndex = parseInt(capEl.value,10); };
    const saveBtn = document.getElementById("saveTeamBtn");
    if(saveBtn) saveBtn.onclick = async function(){
      const t = ui.editingTeam;
      if(!t.nomeSquadra || !t.animatoreNome){ toast("Compila nome squadra e il tuo nome"); return; }
      const valorizzati = t.componenti.filter(function(c){ return c; });
      if(valorizzati.length<5){ toast("Devi scegliere tutti e 5 i ragazzi"); return; }
      let costo = 0;
      for(const n of t.componenti){ const b=findBambino(n); if(!b){ toast("Ragazzo non trovato: "+n); return; } costo += b.costo; }
      if(costo>100){ toast("Superi i 100 mimmi (costo attuale: "+costo+")"); return; }
      const capitano = t.componenti[t.capitanoIndex||0] || t.componenti[0];
      try{
        await db.collection("squadre").doc(usernameOf(user.email)).set({
          nomeSquadra: t.nomeSquadra, animatoreNome: t.animatoreNome, animatoreEmail: user.email,
          componenti: t.componenti, capitano: capitano,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast("Squadra salvata!"); ui.editingTeam = null;
      }catch(e){ toast("Errore: "+e.message); }
    };
    const deleteBtn2 = document.getElementById("deleteTeamBtn");
    if(deleteBtn2) deleteBtn2.onclick = async function(){
      if(!confirm("Eliminare definitivamente questa squadra?")) return;
      try{
        await db.collection("squadre").doc(usernameOf(user.email)).delete();
        ui.editingTeam = null;
        toast("Squadra eliminata");
      }catch(e){ toast("Errore: "+e.message); }
    };
  }
  if(ui.tab==="bambini"){
    const input = document.getElementById("searchBambini");
    if(input) input.oninput = function(){ ui.search = input.value; render(); const el=document.getElementById("searchBambini"); el.focus(); el.selectionStart = el.value.length; };
  }
  if(ui.tab==="assegna"){
    Array.prototype.forEach.call(document.querySelectorAll("[data-day]"), function(b){ b.onclick=function(){ ui.day=b.dataset.day; render(); }; });
    const input = document.getElementById("searchAssegna");
    if(input) input.oninput = function(){ ui.search = input.value; render(); const el=document.getElementById("searchAssegna"); el.focus(); el.selectionStart = el.value.length; };
    Array.prototype.forEach.call(document.querySelectorAll("[data-kid]"), function(chip){
      chip.onclick = function(){
        const n = chip.dataset.kid;
        if(ui.selectedKids.has(n)) ui.selectedKids.delete(n); else ui.selectedKids.add(n);
        render();
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-selgruppo]"), function(chip){
      chip.onclick = function(){
        const g = state.gruppi.filter(function(x){ return x.id===chip.dataset.selgruppo; })[0];
        if(!g) return;
        (g.componenti||[]).forEach(function(n){ ui.selectedKids.add(n); });
        toast('Aggiunti i '+(g.componenti||[]).length+' componenti di "'+g.nome+'"');
        render();
      };
    });
    const svuotaBtn = document.getElementById("svuotaSelezioneBtn");
    if(svuotaBtn) svuotaBtn.onclick = function(e){ e.preventDefault(); ui.selectedKids.clear(); render(); };
    Array.prototype.forEach.call(document.querySelectorAll("[data-cat]"), function(b){ b.onclick=function(){ ui.catTab=b.dataset.cat; render(); }; });
    Array.prototype.forEach.call(document.querySelectorAll("[data-catitem]"), function(el){
      el.onclick = function(){
        const item = CATALOGO[ui.catTab].filter(function(i){ return i.id===el.dataset.catitem; })[0];
        applyToSelected(item.label, item.pts);
      };
    });
    const applyCustomBtn = document.getElementById("applyCustom");
    if(applyCustomBtn) applyCustomBtn.onclick = function(){
      const label = (document.getElementById("customLabel").value||"").trim() || "Personalizzato";
      const pts = parseInt(document.getElementById("customPts").value, 10) || 0;
      applyToSelected(label, pts);
    };
  }
  if(ui.tab==="storico"){
    Array.prototype.forEach.call(document.querySelectorAll("[data-storicoday]"), function(b){
      b.onclick = function(){ ui.storicoFiltroGiorno = b.dataset.storicoday; render(); };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-undo]"), function(b){
      b.onclick = async function(){
        try{ await db.collection("punti_log").doc(b.dataset.undo).delete(); toast("Annullato"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
  }
  if(ui.tab==="admin"){
    Array.prototype.forEach.call(document.querySelectorAll("[data-delsquadra]"), function(b){
      b.onclick = async function(){
        if(!confirm("Eliminare definitivamente questa squadra?")) return;
        try{ await db.collection("squadre").doc(b.dataset.delsquadra).delete(); toast("Squadra eliminata"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
    const nuovoGruppoBtn = document.getElementById("nuovoGruppoBtn");
    if(nuovoGruppoBtn) nuovoGruppoBtn.onclick = function(){ ui.editingGruppo = {id:null, nome:"", componenti:[]}; render(); };
    Array.prototype.forEach.call(document.querySelectorAll("[data-editgruppo]"), function(b){
      b.onclick = function(){
        const g = state.gruppi.filter(function(x){ return x.id===b.dataset.editgruppo; })[0];
        if(!g) return;
        ui.editingGruppo = {id:g.id, nome:g.nome, componenti:(g.componenti||[]).slice()};
        render();
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-delgruppo]"), function(b){
      b.onclick = async function(){
        if(!confirm("Eliminare questa squadra reale?")) return;
        try{ await db.collection("gruppi").doc(b.dataset.delgruppo).delete(); toast("Eliminata"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-gruppokid]"), function(chip){
      chip.onclick = function(){
        const n = chip.dataset.gruppokid;
        const idx = ui.editingGruppo.componenti.indexOf(n);
        if(idx===-1) ui.editingGruppo.componenti.push(n); else ui.editingGruppo.componenti.splice(idx,1);
        render();
      };
    });
    const annullaGruppoBtn = document.getElementById("annullaGruppoBtn");
    if(annullaGruppoBtn) annullaGruppoBtn.onclick = function(){ ui.editingGruppo = null; render(); };
    const salvaGruppoBtn = document.getElementById("salvaGruppoBtn");
    if(salvaGruppoBtn) salvaGruppoBtn.onclick = async function(){
      const eg = ui.editingGruppo;
      const nome = (document.getElementById("gruppoNome").value||"").trim();
      if(!nome){ toast("Inserisci un nome"); return; }
      if(eg.componenti.length===0){ toast("Seleziona almeno un componente"); return; }
      try{
        if(eg.id && eg.id!==nome){
          await db.collection("gruppi").doc(nome).set({nome:nome, componenti:eg.componenti});
          await db.collection("gruppi").doc(eg.id).delete();
        } else {
          await db.collection("gruppi").doc(nome).set({nome:nome, componenti:eg.componenti});
        }
        ui.editingGruppo = null;
        toast("Squadra reale salvata");
      }catch(e){ toast("Errore: "+e.message); }
    };
    const exportPdfBtn = document.getElementById("exportPdfBtn");
    if(exportPdfBtn) exportPdfBtn.onclick = function(){ esportaClassificaPDF(); };
    Array.prototype.forEach.call(document.querySelectorAll("[data-rmadmin]"), function(b){
      b.onclick = async function(){
        try{ await db.collection("admins").doc(b.dataset.rmadmin).delete(); toast("Rimosso"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
    const addBtn = document.getElementById("addAdminBtn");
    if(addBtn) addBtn.onclick = async function(){
      const v = (document.getElementById("newAdminEmail").value||"").trim().toLowerCase();
      if(!v) return;
      try{ await db.collection("admins").doc(v).set({addedAt: firebase.firestore.FieldValue.serverTimestamp()}); toast("Amministratore aggiunto"); document.getElementById("newAdminEmail").value=""; }
      catch(e){ toast("Errore: "+e.message); }
    };
    const toggleBtn = document.getElementById("toggleFinaleBtn");
    if(toggleBtn) toggleBtn.onclick = async function(){
      try{ await db.collection("config").doc("main").update({classificaFinalePubblicata: !state.config.classificaFinalePubblicata}); toast("Aggiornato"); }
      catch(e){ toast("Errore: "+e.message); }
    };
    Array.prototype.forEach.call(document.querySelectorAll("[data-approva]"), function(b){
      b.onclick = async function(){
        try{ await db.collection("utenti").doc(b.dataset.approva).update({stato:"attivo"}); toast("Account approvato"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-toggledis]"), function(b){
      b.onclick = async function(){
        const uname = b.dataset.toggledis;
        const cur = b.dataset.cur;
        const nuovo = cur==="attivo" ? "disabilitato" : "attivo";
        try{ await db.collection("utenti").doc(uname).update({stato: nuovo}); toast(nuovo==="attivo"?"Riattivato":"Disabilitato"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });

    const toggleBambiniListBtn = document.getElementById("toggleBambiniListBtn");
    if(toggleBambiniListBtn) toggleBambiniListBtn.onclick = function(){ ui.bambiniExpanded = !ui.bambiniExpanded; render(); };

    const saveScadBtn = document.getElementById("saveScadenzeBtn");
    if(saveScadBtn) saveScadBtn.onclick = async function(){
      const vS = document.getElementById("inpScadSquadre").value;
      const vP = document.getElementById("inpScadPunti").value;
      if(!vS || !vP){ toast("Compila entrambe le date"); return; }
      try{
        await db.collection("config").doc("main").update({
          scadenzaSquadre: firebase.firestore.Timestamp.fromDate(new Date(vS)),
          scadenzaPunti: firebase.firestore.Timestamp.fromDate(new Date(vP))
        });
        toast("Scadenze aggiornate");
      }catch(e){ toast("Errore: "+e.message); }
    };

    Array.prototype.forEach.call(document.querySelectorAll("[data-savebambino]"), function(b){
      b.onclick = async function(){
        const vecchioNome = b.dataset.savebambino;
        const nomeInput = document.querySelector('.bambino-nome-input[data-nomeorig="'+CSS.escape(vecchioNome)+'"]');
        const costoInput = document.querySelector('.bambino-costo-input[data-nomeorig="'+CSS.escape(vecchioNome)+'"]');
        const nuovoNome = (nomeInput.value||"").trim();
        const nuovoCosto = parseInt(costoInput.value, 10);
        if(!nuovoNome){ toast("Il nome non può essere vuoto"); return; }
        if(isNaN(nuovoCosto) || nuovoCosto<0){ toast("Costo non valido"); return; }

        if(nuovoNome === vecchioNome){
          try{ await db.collection("bambini").doc(vecchioNome).update({costo:nuovoCosto}); toast("Costo aggiornato"); }
          catch(e){ toast("Errore: "+e.message); }
          return;
        }

        try{
          toast("Rinomino e aggiorno riferimenti...");
          const batch1 = db.batch();
          batch1.set(db.collection("bambini").doc(nuovoNome), {nome:nuovoNome, costo:nuovoCosto});
          batch1.delete(db.collection("bambini").doc(vecchioNome));
          await batch1.commit();

          const squadreSnap = await db.collection("squadre").get();
          const batch2 = db.batch();
          squadreSnap.forEach(function(doc){
            const t = doc.data();
            let cambiato = false;
            const comp = (t.componenti||[]).map(function(n){ if(n===vecchioNome){ cambiato=true; return nuovoNome; } return n; });
            let capitano = t.capitano;
            if(capitano===vecchioNome){ capitano = nuovoNome; cambiato = true; }
            if(cambiato) batch2.update(doc.ref, {componenti:comp, capitano:capitano});
          });
          await batch2.commit();

          const puntiSnap = await db.collection("punti_log").where("bambino","==",vecchioNome).get();
          const batch3 = db.batch();
          puntiSnap.forEach(function(doc){ batch3.update(doc.ref, {bambino:nuovoNome}); });
          await batch3.commit();

          toast("Ragazzo rinominato in \""+nuovoNome+"\", riferimenti aggiornati");
        }catch(e){ toast("Errore durante la rinomina: "+e.message); }
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-delbambino]"), function(b){
      b.onclick = async function(){
        if(!confirm("Eliminare \""+b.dataset.delbambino+"\" dall'elenco?")) return;
        try{ await db.collection("bambini").doc(b.dataset.delbambino).delete(); toast("Eliminato"); }
        catch(e){ toast("Errore: "+e.message); }
      };
    });
    const addBambinoBtn = document.getElementById("addBambinoBtn");
    if(addBambinoBtn) addBambinoBtn.onclick = async function(){
      const nome = (document.getElementById("nuovoBambinoNome").value||"").trim();
      const costo = parseInt(document.getElementById("nuovoBambinoCosto").value, 10);
      if(!nome){ toast("Inserisci un nome"); return; }
      if(isNaN(costo) || costo<0){ toast("Costo non valido"); return; }
      try{
        await db.collection("bambini").doc(nome).set({nome:nome, costo:costo});
        toast("Ragazzo aggiunto");
        document.getElementById("nuovoBambinoNome").value=""; document.getElementById("nuovoBambinoCosto").value="";
      }catch(e){ toast("Errore: "+e.message); }
    };
    const importBtn = document.getElementById("importBambiniBtn");
    if(importBtn) importBtn.onclick = async function(){
      const raw = document.getElementById("importBambiniText").value||"";
      const righe = raw.split(String.fromCharCode(10)).map(function(r){ return r.trim(); }).filter(function(r){ return r; });
      if(righe.length===0){ toast("Incolla almeno una riga"); return; }
      try{
        const batch = db.batch();
        let n = 0;
        righe.forEach(function(riga){
          const parti = riga.split(",");
          if(parti.length<2) return;
          const nome = parti[0].trim();
          const costo = parseInt(parti[1].trim(), 10);
          if(!nome || isNaN(costo)) return;
          batch.set(db.collection("bambini").doc(nome), {nome:nome, costo:costo});
          n++;
        });
        await batch.commit();
        toast(n+" ragazzi importati");
        document.getElementById("importBambiniText").value="";
      }catch(e){ toast("Errore: "+e.message); }
    };
  }
  if(ui.tab==="account"){
    const changePwBtn = document.getElementById("changePwBtn");
    if(changePwBtn) changePwBtn.onclick = async function(){
      const cur = document.getElementById("curPass").value||"";
      const np = document.getElementById("newPass").value||"";
      const msgEl = document.getElementById("pwMsg");
      if(np.length<6){ msgEl.textContent = "La nuova password deve avere almeno 6 caratteri"; return; }
      msgEl.textContent = "Aggiornamento in corso...";
      try{
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, cur);
        await user.reauthenticateWithCredential(cred);
        await user.updatePassword(np);
        msgEl.textContent = "";
        toast("Password aggiornata!");
        document.getElementById("curPass").value=""; document.getElementById("newPass").value="";
      }catch(e){
        if(e.code==="auth/wrong-password" || e.code==="auth/invalid-credential") msgEl.textContent = "Password attuale errata";
        else msgEl.textContent = "Errore: "+e.message;
      }
    };
    const logoutBtn = document.getElementById("logoutBtn");
    if(logoutBtn) logoutBtn.onclick = function(){ auth.signOut(); };
    const deleteBtn = document.getElementById("deleteAccBtn");
    if(deleteBtn) deleteBtn.onclick = async function(){
      const pass = document.getElementById("delPass").value||"";
      const msgEl = document.getElementById("delMsg");
      if(!confirm("Sei sicuro? L'account e la tua squadra verranno eliminati per sempre.")) return;
      msgEl.textContent = "Eliminazione in corso...";
      try{
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, pass);
        await user.reauthenticateWithCredential(cred);
        const uname = usernameOf(user.email);
        try{ await db.collection("squadre").doc(uname).delete(); }catch(e2){}
        try{ await db.collection("utenti").doc(uname).delete(); }catch(e2){}
        await user.delete();
        toast("Account eliminato");
      }catch(e){
        if(e.code==="auth/wrong-password" || e.code==="auth/invalid-credential") msgEl.textContent = "Password errata";
        else msgEl.textContent = "Errore: "+e.message;
      }
    };
  }
}

async function applyToSelected(label, pts){
  if(ui.selectedKids.size===0){ toast("Seleziona almeno un ragazzo"); return; }
  const nomi = Array.from(ui.selectedKids);
  try{
    const batch = db.batch();
    nomi.forEach(function(nome){
      const ref = db.collection("punti_log").doc();
      batch.set(ref, {
        giorno: ui.day, bambino: nome, etichetta: label, punti: pts,
        assegnatoDa: usernameOf(user.email), ts: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    toast(label+" ("+(pts>0?"+":"")+pts+") applicato a "+nomi.length+" ragazzo/i");
    ui.selectedKids.clear();
    render();
  }catch(e){ toast("Errore: "+e.message); }
}

// Ricontrolla ogni 30 secondi: fa sì che scadenze/classifica si aggiornino da sole nel tempo,
// anche se nessun dato nuovo arriva dal database.
setInterval(function(){ if(user) render(); }, 30000);

function esportaClassificaPDF(){
  try{
    const jsPDFLib = window.jspdf && window.jspdf.jsPDF;
    if(!jsPDFLib){ toast("Libreria PDF non disponibile (controlla la connessione)"); return; }
    const doc = new jsPDFLib({unit:"pt", format:"a4"});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();

    function nuovaPagina(){
      doc.setFillColor(14,39,31);
      doc.rect(0,0,pageW,pageH,"F");
    }
    nuovaPagina();

    doc.setFillColor(18,51,40);
    doc.rect(0,0,pageW,74,"F");
    doc.setTextColor(242,183,5);
    doc.setFont("helvetica","bold");
    doc.setFontSize(26);
    doc.text("FANTACAMPO 2026", pageW/2, 36, {align:"center"});
    doc.setFontSize(13);
    doc.setTextColor(251,246,234);
    doc.text("Classifica finale", pageW/2, 56, {align:"center"});

    const sorted = state.squadre.slice().sort(function(a,b){
      return (teamScoreCost(b).punteggio||0) - (teamScoreCost(a).punteggio||0);
    });

    let y = 100;
    const rowH = 46;
    sorted.forEach(function(t, i){
      if(y + rowH > pageH - 40){ doc.addPage(); nuovaPagina(); y = 40; }
      const sc = teamScoreCost(t);
      if(i%2===0) doc.setFillColor(23,59,47); else doc.setFillColor(28,68,54);
      doc.roundedRect(30, y, pageW-60, rowH-8, 8, 8, "F");

      doc.setFillColor(242,183,5);
      doc.roundedRect(30, y, 42, rowH-8, 8, 8, "F");
      doc.setTextColor(28,28,28);
      doc.setFont("helvetica","bold");
      doc.setFontSize(15);
      doc.text(String(i+1), 51, y+(rowH-8)/2+5, {align:"center"});

      doc.setTextColor(251,246,234);
      doc.setFont("helvetica","bold");
      doc.setFontSize(13);
      doc.text(t.nomeSquadra||"Senza nome", 88, y+17);
      doc.setFont("helvetica","normal");
      doc.setFontSize(9);
      doc.setTextColor(159,194,174);
      doc.text("animatore: "+(t.animatoreNome||t.id), 88, y+31);

      doc.setFont("helvetica","bold");
      doc.setFontSize(18);
      doc.setTextColor(242,183,5);
      doc.text(String(sc.punteggio||0)+" pt", pageW-45, y+(rowH-8)/2+6, {align:"right"});

      y += rowH;
    });

    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.setTextColor(159,194,174);
    doc.text("Generato il "+new Date().toLocaleString("it-IT"), pageW/2, pageH-20, {align:"center"});

    doc.save("fantacampo-classifica-finale.pdf");
    toast("PDF scaricato");
  }catch(e){
    toast("Errore nell'export PDF: "+e.message);
  }
}
</script>
